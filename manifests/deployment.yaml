apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-hero-app
spec:
  revisionHistoryLimit: 3
  replicas: 2 # Run two copies for "Resilience"
  selector:
    matchLabels:
      app: hero-web
  template:
    metadata:
      labels:
        app: hero-web
    spec:
      containers:
      - name: web
        image: ghcr.io/rawleyc/my-web-app:sha-eb6f6c8f464be6af708479b447b0f28d95abf82b
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: hero-service
spec:
  selector:
    app: hero-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
